name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact: CloneTato-linux-x64
            itch_channel: linux
          - os: windows-latest
            rid: win-x64
            artifact: CloneTato-win-x64
            itch_channel: windows
          - os: macos-latest
            rid: osx-arm64
            artifact: CloneTato-macos-arm64
            itch_channel: osx-arm64
          - os: macos-13
            rid: osx-x64
            artifact: CloneTato-macos-x64
            itch_channel: osx-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        run: >
          dotnet publish CloneTato.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -o publish/${{ matrix.artifact }}

      - name: Archive (Unix)
        if: runner.os != 'Windows'
        working-directory: publish
        run: tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        working-directory: publish
        run: Compress-Archive -Path ${{ matrix.artifact }} -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: publish/${{ matrix.artifact }}.*

      - name: Upload build directory
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-dir
          path: publish/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/CloneTato-linux-x64/*.tar.gz
            artifacts/CloneTato-win-x64/*.zip
            artifacts/CloneTato-macos-arm64/*.tar.gz
            artifacts/CloneTato-macos-x64/*.tar.gz

  publish-itch:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ vars.ITCH_GAME != '' }}

    strategy:
      matrix:
        include:
          - artifact: CloneTato-linux-x64
            channel: linux
          - artifact: CloneTato-win-x64
            channel: windows
          - artifact: CloneTato-macos-arm64
            channel: osx-arm64
          - artifact: CloneTato-macos-x64
            channel: osx-x64

    steps:
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}-dir
          path: build

      - name: Install butler
        run: |
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          ./butler -V

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: >
          ./butler push build
          ${{ vars.ITCH_USER }}/${{ vars.ITCH_GAME }}:${{ matrix.channel }}
          --userversion ${{ github.ref_name }}
